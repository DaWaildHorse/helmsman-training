apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs-example
spec:
  replicas: 3
  selector:
    matchLabels:
      app: smol-nginx
      type: front-end
  template:
    metadata:
      name: test-pod
      labels:
        app: smol-nginx
        type: front-end
    spec:
      containers:
        - name: nginx-container
          image: nginx
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
